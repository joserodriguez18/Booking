<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookingApp — Panel de propietario</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="text-rose-500 font-bold text-xl">🏠 BookingApp</a>
      <div id="nav-user" class="flex items-center gap-3"></div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">Panel de propietario</h1>
        <p id="fecha-rango" class="text-sm text-gray-400 mt-0.5"></p>
      </div>
      <div class="flex gap-2">
        <button onclick="exportar()"
          class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-xl text-sm text-gray-600 hover:border-rose-300 hover:text-rose-500 transition-colors">
          📥 Exportar Excel
        </button>
        <button onclick="abrirFormProp()"
          class="flex items-center gap-2 px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl text-sm font-medium transition-colors">
          ➕ Nueva propiedad
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 animate-pulse h-28"></div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 animate-pulse h-28"></div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 animate-pulse h-28"></div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 animate-pulse h-28"></div>
    </div>

    <!-- Lista de propiedades -->
    <h2 class="text-lg font-semibold text-gray-800 mb-4">Mis propiedades</h2>
    <div id="props" class="space-y-3">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center text-gray-400 animate-pulse">
        Cargando...
      </div>
    </div>
  </div>

  <!-- Modal: nueva propiedad -->
  <div id="modal-prop" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-bold text-gray-800">Nueva propiedad</h3>
        <button onclick="cerrarModal('modal-prop')" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
      </div>
      <form onsubmit="crearPropiedad(event)" class="p-6 space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-600 uppercase tracking-wide block mb-1.5">Nombre</label>
          <input name="name" required placeholder="Ej: Villa frente al mar"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100">
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-600 uppercase tracking-wide block mb-1.5">Descripción</label>
          <textarea name="description" required rows="3" placeholder="Describe qué hace especial tu propiedad..."
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 resize-none"></textarea>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-600 uppercase tracking-wide block mb-1.5">Ubicación</label>
          <input name="location" required placeholder="Ej: Cartagena, Colombia"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wide block mb-1.5">Precio / noche</label>
            <input name="price" type="number" min="1" required placeholder="150000"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100">
          </div>
          <div>
            <label class="text-xs font-semibold text-gray-600 uppercase tracking-wide block mb-1.5">Moneda</label>
            <select name="currency"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-rose-400 bg-white">
              <option value="COP">COP</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="cerrarModal('modal-prop')"
            class="flex-1 border border-gray-200 rounded-xl py-2.5 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
          <button type="submit" id="btn-crear"
            class="flex-1 bg-rose-500 hover:bg-rose-600 text-white rounded-xl py-2.5 text-sm font-semibold transition-colors">
            Crear propiedad
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: subir fotos -->
  <div id="modal-foto" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-bold text-gray-800">📸 Subir fotos</h3>
        <button onclick="cerrarModal('modal-foto')" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
      </div>
      <div class="p-6">
        <input type="hidden" id="foto-prop-id">
        <div class="border-2 border-dashed border-gray-200 hover:border-rose-300 rounded-2xl p-8 text-center mb-4 transition-colors cursor-pointer"
          onclick="document.getElementById('input-foto').click()">
          <input id="input-foto" type="file" accept="image/*" multiple class="hidden" onchange="previewFotos(this)">
          <div id="ph-foto">
            <div class="text-4xl mb-2">📷</div>
            <p class="text-sm text-gray-500">Haz click para seleccionar una o varias imágenes</p>
            <p class="text-xs text-gray-400 mt-1">JPG, PNG, WebP — puedes seleccionar hasta 10 a la vez</p>
          </div>
          <div id="prev-foto" class="hidden">
            <div id="prev-grid" class="grid grid-cols-3 gap-2 mb-2"></div>
            <p class="text-xs text-gray-400">Click para cambiar la selección</p>
          </div>
        </div>
        <div class="flex gap-3">
          <button onclick="cerrarModal('modal-foto')"
            class="flex-1 border border-gray-200 rounded-xl py-2.5 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
          <button onclick="subirFoto()" id="btn-foto"
            class="flex-1 bg-rose-500 hover:bg-rose-600 text-white rounded-xl py-2.5 text-sm font-semibold transition-colors">
            Subir fotos
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (!auth.isLogged()) { window.location.href = 'auth.html?next=dashboard.html'; }
    else if (auth.user()?.role !== 'Owner') { window.location.href = 'index.html'; }
    renderNav();

    function statCard(icon, label, val) {
      return `<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="text-2xl mb-2">${icon}</div>
        <div class="text-2xl font-bold text-gray-800 mb-0.5">${val}</div>
        <div class="text-xs text-gray-500 font-medium">${label}</div>
      </div>`;
    }

    function propCard(m) {
      return `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div>
            <div class="flex items-center gap-2 mb-2">
              <h3 class="font-semibold text-gray-800">${m.name}</h3>
            </div>
            <div class="flex flex-wrap gap-4 text-xs text-gray-500">
              <span class="flex items-center gap-1">📅 <strong class="text-gray-700">${m.totalReservas}</strong> reserva${m.totalReservas !== 1 ? 's' : ''}</span>
              <span class="flex items-center gap-1">💰 <strong class="text-gray-700">${formatPrecio(m.ingresos)}</strong></span>
              <span class="flex items-center gap-1">📊 <strong class="text-gray-700">${(m.tasaOcupacion * 100).toFixed(0)}%</strong> ocupación</span>
            </div>
          </div>
          <div class="flex gap-2 shrink-0">
            <button onclick="abrirFoto('${m.propertyId}')"
              class="px-3 py-1.5 text-xs border border-gray-200 rounded-xl hover:border-rose-300 hover:text-rose-500 transition-colors">
              📸 Fotos
            </button>
            <a href="property.html?id=${m.propertyId}"
              class="px-3 py-1.5 text-xs border border-gray-200 rounded-xl hover:border-rose-300 hover:text-rose-500 transition-colors">
              👁 Ver
            </a>
          </div>
        </div>
      </div>`;
    }

    async function cargar() {
      try {
        const d = await api.getDashboard();
        document.getElementById('fecha-rango').textContent =
          `${formatFecha(d.desde)} — ${formatFecha(d.hasta)}`;

        document.getElementById('stats').innerHTML = [
          statCard('🏠', 'Propiedades activas',        d.totalPropiedades),
          statCard('📅', 'Reservas confirmadas',       d.totalReservasConfirmadas),
          statCard('💰', 'Ingresos totales',           formatPrecio(d.ingresosTotales)),
          statCard('📊', 'Tasa de ocupación',          `${(d.tasaOcupacionGeneral * 100).toFixed(0)}%`),
        ].join('');

        const lista = d.metricasPorPropiedad;
        document.getElementById('props').innerHTML = lista?.length
          ? lista.map(propCard).join('')
          : `<div class="bg-white rounded-2xl border-2 border-dashed border-gray-200 p-12 text-center text-gray-400">
               <div class="text-4xl mb-3">🏗️</div>
               <p class="font-medium">Aún no tienes propiedades</p>
               <p class="text-sm mt-1">Usa el botón "Nueva propiedad" para agregar la primera</p>
             </div>`;
      } catch (e) {
        toast('Error al cargar el panel: ' + e.message, 'error');
        document.getElementById('props').innerHTML =
          `<div class="text-center py-8 text-red-400">${e.message}</div>`;
      }
    }

    function abrirFormProp() { document.getElementById('modal-prop').classList.remove('hidden'); }
    function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }

    async function crearPropiedad(e) {
      e.preventDefault();
      const f = e.target, btn = document.getElementById('btn-crear');
      btn.textContent = 'Creando...'; btn.disabled = true;
      try {
        await api.createProperty({
          name:          f.name.value,
          description:   f.description.value,
          location:      f.location.value,
          pricePerNight: parseFloat(f.price.value),
          currency:      f.currency.value,
        });
        toast('¡Propiedad creada! 🎉');
        cerrarModal('modal-prop');
        f.reset();
        cargar();
      } catch (e) {
        toast(e.message, 'error');
        btn.textContent = 'Crear propiedad'; btn.disabled = false;
      }
    }

    function abrirFoto(propId) {
      document.getElementById('foto-prop-id').value = propId;
      document.getElementById('input-foto').value = '';
      document.getElementById('ph-foto').classList.remove('hidden');
      document.getElementById('prev-foto').classList.add('hidden');
      document.getElementById('modal-foto').classList.remove('hidden');
    }

    function previewFotos(input) {
      if (!input.files.length) return;
      const grid = document.getElementById('prev-grid');
      grid.innerHTML = '';
      Array.from(input.files).slice(0, 9).forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'w-full h-20 object-cover rounded-lg';
          grid.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
      if (input.files.length > 9) {
        const more = document.createElement('div');
        more.className = 'w-full h-20 bg-gray-100 rounded-lg flex items-center justify-center text-sm text-gray-500 font-semibold';
        more.textContent = `+${input.files.length - 9} más`;
        grid.appendChild(more);
      }
      document.getElementById('ph-foto').classList.add('hidden');
      document.getElementById('prev-foto').classList.remove('hidden');
    }

    async function subirFoto() {
      const propId = document.getElementById('foto-prop-id').value;
      const files  = document.getElementById('input-foto').files;
      if (!files.length) { toast('Selecciona al menos una imagen', 'error'); return; }

      const btn = document.getElementById('btn-foto');
      btn.textContent = 'Subiendo...'; btn.disabled = true;

      const fd = new FormData();
      Array.from(files).forEach(f => fd.append('fotos', f));
      try {
        await api.uploadPhoto(propId, fd);
        toast(`${files.length} foto${files.length > 1 ? 's' : ''} subida${files.length > 1 ? 's' : ''} ✅`);
        cerrarModal('modal-foto');
        cargar();
      } catch (e) {
        toast(e.message || 'Error al subir las fotos', 'error');
        btn.textContent = 'Subir fotos'; btn.disabled = false;
      }
    }

    async function exportar() {
      try {
        const res = await api.exportReport();
        if (!res.ok) { toast('Error al generar el reporte', 'error'); return; }
        const blob = await res.blob();
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob), download: 'reservas.xlsx'
        });
        a.click();
        URL.revokeObjectURL(a.href);
        toast('Reporte descargado ✅');
      } catch (e) { toast(e.message, 'error'); }
    }

    cargar();
  </script>
</body>
</html>
