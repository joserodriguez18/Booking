<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookingApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="history.back()"
          class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-800 transition-colors">
          ← Volver
        </button>
        <a href="index.html" class="text-rose-500 font-bold text-lg">🏠 BookingApp</a>
      </div>
      <div id="nav-user" class="flex items-center gap-3"></div>
    </div>
  </nav>

  <!-- Loading -->
  <div id="loading" class="flex items-center justify-center min-h-96 text-gray-400">
    <div class="text-center">
      <div class="text-4xl mb-3 animate-pulse">🏠</div>
      <p>Cargando propiedad...</p>
    </div>
  </div>

  <!-- Contenido -->
  <div id="content" class="hidden max-w-6xl mx-auto px-4 py-8">

    <!-- Galería de fotos -->
    <div id="galeria" class="mb-8 rounded-2xl overflow-hidden"></div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

      <!-- Info -->
      <div class="lg:col-span-3">
        <div class="flex items-start justify-between gap-4 mb-3">
          <h1 id="prop-name" class="text-2xl font-bold text-gray-800 leading-tight"></h1>
          <button id="btn-wish" onclick="toggleWish()"
            class="text-2xl flex-shrink-0 hover:scale-110 transition-transform focus:outline-none"
            title="Guardar en favoritos">🤍</button>
        </div>
        <p id="prop-loc" class="text-gray-500 mb-4"></p>
        <div class="h-px bg-gray-100 mb-6"></div>
        <h2 class="font-semibold text-gray-700 mb-3">Descripción</h2>
        <p id="prop-desc" class="text-gray-600 text-sm leading-relaxed"></p>
      </div>

      <!-- Tarjeta de reserva -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 sticky top-20">

          <div class="flex items-baseline gap-1.5 mb-5">
            <span id="prop-precio" class="text-2xl font-bold text-gray-900"></span>
            <span class="text-gray-400 text-sm">/ noche</span>
          </div>

          <div id="form-reserva">
            <!-- Fechas -->
            <div class="border border-gray-200 rounded-xl overflow-hidden mb-4">
              <div class="grid grid-cols-2 divide-x divide-gray-200">
                <div class="p-3">
                  <div class="text-xs font-semibold text-gray-500 uppercase mb-1">Check-in</div>
                  <input id="ci" type="date" onchange="calcTotal()"
                    class="w-full text-sm text-gray-800 outline-none">
                </div>
                <div class="p-3">
                  <div class="text-xs font-semibold text-gray-500 uppercase mb-1">Check-out</div>
                  <input id="co" type="date" onchange="calcTotal()"
                    class="w-full text-sm text-gray-800 outline-none">
                </div>
              </div>
            </div>

            <!-- Desglose total -->
            <div id="total-box" class="hidden bg-gray-50 rounded-xl p-4 mb-4 space-y-2 text-sm">
              <div class="flex justify-between text-gray-600">
                <span id="desc-precio"></span>
                <span id="subtotal" class="font-semibold text-gray-800"></span>
              </div>
              <div class="border-t border-gray-200 pt-2 flex justify-between font-bold text-gray-900">
                <span>Total</span>
                <span id="total-final"></span>
              </div>
            </div>

            <button onclick="reservar()" id="btn-reservar"
              class="w-full bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-bold text-sm transition-colors">
              Reservar ahora
            </button>
            <p class="text-center text-xs text-gray-400 mt-2">No se realizará ningún cobro aún</p>
          </div>

          <!-- Éxito -->
          <div id="reserva-ok" class="hidden text-center py-4">
            <div class="text-4xl mb-3">🎉</div>
            <p class="font-bold text-emerald-600 mb-1">¡Reserva creada!</p>
            <p class="text-xs text-gray-500 mb-4">Tienes una reserva pendiente de confirmación</p>
            <a href="profile.html"
              class="text-sm text-rose-500 underline">Ver mis reservas →</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    renderNav();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) window.location.href = 'index.html';

    let prop = null, enWish = false;

    async function cargar() {
      try {
        prop = await api.getProperty(id);
        document.title = prop.name + ' — BookingApp';

        // Galería
        const fotos = prop.photoUrls?.length ? prop.photoUrls : [PLACEHOLDER];
        document.getElementById('galeria').innerHTML = fotos.length === 1
          ? `<img src="${fotos[0]}" class="w-full h-72 sm:h-96 object-cover" onerror="this.src='${PLACEHOLDER}'">`
          : `<div class="grid grid-cols-2 gap-1 max-h-80">
              <img src="${fotos[0]}" class="w-full h-full object-cover row-span-2 max-h-80" onerror="this.src='${PLACEHOLDER}'">
              <div class="flex flex-col gap-1">
                ${fotos.slice(1, 3).map(u =>
                  `<img src="${u}" class="w-full h-full object-cover max-h-[9.5rem]" onerror="this.src='${PLACEHOLDER}'">`
                ).join('')}
              </div>
            </div>`;

        document.getElementById('prop-name').textContent  = prop.name;
        document.getElementById('prop-loc').innerHTML     = `📍 ${prop.location}`;
        document.getElementById('prop-desc').textContent  = prop.description;
        document.getElementById('prop-precio').textContent = formatPrecio(prop.pricePerNight, prop.currency);

        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('ci').min = hoy;
        document.getElementById('co').min = hoy;

        if (auth.isLogged()) {
          try {
            const wl = await api.getWishlist();
            enWish = wl.some(p => p.id === id);
          } catch (_) {}
        }
        document.getElementById('btn-wish').textContent = enWish ? '❤️' : '🤍';

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loading').innerHTML = `
          <div class="text-center py-20 text-gray-400">
            <div class="text-5xl mb-4">😕</div>
            <p class="text-lg mb-4">${e.message}</p>
            <a href="index.html" class="text-rose-500 underline">← Volver al inicio</a>
          </div>`;
      }
    }

    function calcTotal() {
      const ci = document.getElementById('ci').value;
      const co = document.getElementById('co').value;
      const box = document.getElementById('total-box');
      if (!ci || !co || !prop) { box.classList.add('hidden'); return; }
      const noches = diffNoches(ci, co);
      if (noches <= 0) { box.classList.add('hidden'); return; }
      const total = prop.pricePerNight * noches;
      document.getElementById('desc-precio').textContent =
        `${formatPrecio(prop.pricePerNight, prop.currency)} × ${noches} noche${noches > 1 ? 's' : ''}`;
      document.getElementById('subtotal').textContent    = formatPrecio(total, prop.currency);
      document.getElementById('total-final').textContent = formatPrecio(total, prop.currency);
      box.classList.remove('hidden');
    }

    async function reservar() {
      if (!auth.isLogged()) {
        window.location.href = `auth.html?next=${encodeURIComponent(location.pathname + location.search)}`;
        return;
      }
      const ci = document.getElementById('ci').value;
      const co = document.getElementById('co').value;
      if (!ci || !co) { toast('Selecciona las fechas de entrada y salida', 'error'); return; }

      const btn = document.getElementById('btn-reservar');
      btn.textContent = 'Procesando...'; btn.disabled = true;
      try {
        await api.createBooking({ propertyId: id, checkIn: ci, checkOut: co });
        document.getElementById('form-reserva').classList.add('hidden');
        document.getElementById('reserva-ok').classList.remove('hidden');
        toast('¡Reserva creada exitosamente!');
      } catch (e) {
        toast(e.message, 'error');
        btn.textContent = 'Reservar ahora'; btn.disabled = false;
      }
    }

    async function toggleWish() {
      if (!auth.isLogged()) {
        window.location.href = `auth.html?next=${encodeURIComponent(location.pathname + location.search)}`;
        return;
      }
      try {
        if (enWish) {
          await api.removeWishlist(id);
          enWish = false;
          toast('Quitado de favoritos');
        } else {
          await api.addWishlist(id);
          enWish = true;
          toast('Guardado en favoritos ❤️');
        }
        document.getElementById('btn-wish').textContent = enWish ? '❤️' : '🤍';
      } catch (e) { toast(e.message, 'error'); }
    }

    cargar();
  </script>
</body>
</html>
